<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageGuard</title>
<style>
  :root {
    --bg: #f2f3f5;
    --card: #fff;
    --border: #e2e4e8;
    --text: #1e2024;
    --text-secondary: #6b7280;
    --primary: #0d9488;
    --danger: #d32f2f;
    --success: #2e7d32;
    --radius: 8px;
  }
  [data-theme="dark"] {
    color-scheme: dark;
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2d313a;
    --text: #e5e7eb;
    --text-secondary: #9ca3af;
    --primary: #2dd4bf;
    --danger: #f07373;
    --success: #5cbb6b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  :focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }

  /* ── 标签栏 ── */
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
  .tab {
    padding: 8px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text-secondary); background: transparent; border: none; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: color .15s, border-color .15s; user-select: none;
    font-family: inherit; line-height: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 16px; border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; font-size: 13px; background: var(--card); color: var(--text);
    transition: opacity .15s, background .15s; white-space: nowrap;
  }
  .btn:hover { opacity: .8; }
  .btn-danger { color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-primary { color: var(--primary); border-color: var(--primary); }
  .btn-primary:hover { background: var(--primary); color: #fff; }
  .btn-success { color: var(--success); border-color: var(--success); }
  .btn-success:hover { background: var(--success); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 20px; flex: 1; min-width: 120px; border-left: 3px solid transparent;
  }
  .stat-card:nth-child(1) { border-left-color: var(--primary); }
  .stat-card:nth-child(2) { border-left-color: var(--danger); }
  .stat-card:nth-child(3) { border-left-color: var(--success); }
  .stat-card .num { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .provider-section {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 16px;
  }
  .provider-section .title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); }
  .provider-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .provider-bar-wrap .name { font-size: 12px; min-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .provider-bar-wrap .count { font-size: 11px; color: var(--text-secondary); min-width: 36px; text-align: right; }
  .provider-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .provider-bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width .3s; }

  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: var(--radius); overflow: hidden; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: var(--bg); font-weight: 600; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); }

  .image-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid var(--border); display: block; }
  .image-thumb:hover { transform: scale(1.05); }
  .img-wrap { position: relative; display: inline-block; line-height: 0; }
  .img-stamp {
    position: absolute; bottom: 3px; right: 3px;
    background: var(--danger); color: #fff; font-size: 9px; font-weight: 600;
    padding: 1px 5px; border-radius: 2px; opacity: .88; pointer-events: none;
    letter-spacing: .5px;
  }
  .img-size { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
  .tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .tag-success { background: #e8f5e9; color: var(--success); }
  .tag-fail { background: #ffebee; color: var(--danger); }
  .tag-muted { background: #f5f5f5; color: var(--text-secondary); }
  [data-theme="dark"] .tag-success { background: #14301a; }
  [data-theme="dark"] .tag-fail { background: #3a1a1a; }
  [data-theme="dark"] .tag-muted { background: var(--card); }
  .reason-text { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-cell { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .lightbox { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,.85); justify-content: center; align-items: center; cursor: zoom-out; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }

  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 16px; font-size: 13px; }
  .pagination .btn:disabled { opacity: .3; cursor: default; }

  /* ── 配置面板 ── */
  .config-panel { display: none; }
  .config-panel.active { display: block; }
  .audit-panel { display: block; }
  .audit-panel.hidden { display: none; }

  .config-section {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 16px;
  }
  .config-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .config-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .config-row label { min-width: 160px; font-size: 13px; font-weight: 500; padding-top: 6px; color: var(--text); }
  .config-row .hint { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .config-row input[type="text"],
  .config-row input[type="number"],
  .config-row select,
  .config-row textarea {
    flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; font-family: inherit; background: var(--card); color: var(--text);
  }
  .config-row textarea { min-height: 60px; resize: vertical; }
  .config-row input[type="checkbox"] { margin-top: 8px; transform: scale(1.2); }
  .config-row .complex-field { flex: 1; font-size: 12px; color: var(--text-secondary); padding-top: 6px; }

  @media (max-width: 600px) {
    table { font-size: 12px; }
    th, td { padding: 6px 8px; }
    .image-thumb { width: 40px; height: 40px; }
    .config-row { flex-direction: column; gap: 4px; }
    .config-row label { min-width: auto; }
  }

  /* ── 自定义弹窗（绕过 iframe sandbox 限制）── */
  .dialog-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; opacity: 0; pointer-events: none; transition: opacity .2s;
    overscroll-behavior: contain;
  }
  .dialog-overlay.open { opacity: 1; pointer-events: auto; }
  .dialog-box {
    background: var(--card); border-radius: var(--radius);
    padding: 20px 24px; min-width: 280px; max-width: 420px;
    box-shadow: 0 8px 30px rgba(0,0,0,.18);
  }
  .dialog-message { font-size: 14px; margin-bottom: 18px; line-height: 1.5; color: var(--text); }
  .dialog-buttons { display: flex; justify-content: flex-end; gap: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>🕵️ ImageGuard</h1>
  <div class="header-actions">
    <button class="btn btn-primary btn-sm" onclick="refresh()" aria-label="刷新审核记录">🔄 刷新</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('audit')" id="tab-audit" aria-label="查看审核记录">📋 审核记录</button>
  <button class="tab" onclick="switchTab('config')" id="tab-config" aria-label="插件配置">⚙️ 配置</button>
</div>

<!-- ════ 审核记录面板 ════ -->
<div class="audit-panel" id="panel-audit">
  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-total">0</div><div class="label">总记录</div></div>
    <div class="stat-card"><div class="num" id="stat-recalled">0</div><div class="label">已撤回</div></div>
    <div class="stat-card"><div class="num" id="stat-banned">0</div><div class="label">已禁言</div></div>
  </div>

  <div class="provider-section">
    <div class="title">🤖 供应商调用统计</div>
    <div id="provider-stats">加载中…</div>
  </div>

  <div class="provider-section">
    <div class="title">📦 审核缓存 <span style="font-size:11px;color:var(--text-secondary);font-weight:400;">同一图片重复多次后跳过审核</span></div>
    <div id="cache-stats">加载中…</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>时间</th>
        <th>用户</th>
        <th>来源</th>
        <th>理由</th>
        <th>图片</th>
        <th>撤回</th>
        <th>禁言</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody"><tr><td colspan="8" class="empty">加载中…</td></tr></tbody>
  </table>

  <div class="pagination" id="pagination"></div>
</div>

<!-- ════ 配置面板 ════ -->
<div class="config-panel" id="panel-config">
  <div class="config-section">
    <h3>🎯 审查规则</h3>
    <div class="config-row">
      <label>敏感文字 <div class="hint">图片中含这些文字即违规，每行一个</div></label>
      <textarea id="cfg-sensitive_texts" rows="3"></textarea>
    </div>
    <div class="config-row">
      <label>违规画面描述 <div class="hint">图片画面符合这些描述即违规，每行一个</div></label>
      <textarea id="cfg-forbidden_descriptions" rows="3"></textarea>
    </div>
    <div class="config-row">
      <label>自定义识图引导词</label>
      <textarea id="cfg-custom_vision_prompt" rows="3"></textarea>
    </div>
  </div>

  <div class="config-section">
    <h3>🔧 LLM 供应商</h3>
    <div class="config-row">
      <label>供应商列表</label>
      <div class="complex-field">
        请在 <a href="#" onclick="openPluginConfig()" style="color:var(--primary)">插件配置页</a> 中管理供应商（增删排序）
        <br><span id="cfg-provider-summary" style="font-size:11px;"></span>
      </div>
    </div>
    <div class="config-row">
      <label>reasoning_effort</label>
      <select id="cfg-reasoning_effort">
        <option value="">不启用</option>
        <option value="low">low</option>
        <option value="medium">medium</option>
        <option value="high">high</option>
      </select>
    </div>
    <div class="config-row">
      <label>最大 Token 数</label>
      <input type="number" id="cfg-llm_max_tokens" min="64" max="8192" step="64">
    </div>
    <div class="config-row">
      <label>超时秒数</label>
      <input type="number" id="cfg-llm_timeout_seconds" min="10" max="600" step="10">
    </div>
  </div>

  <div class="config-section">
    <h3>📡 范围控制</h3>
    <div class="config-row">
      <label>启用审查的群号 <div class="hint">每行一个，"0" 表示所有群</div></label>
      <textarea id="cfg-group_scope" rows="3"></textarea>
    </div>
    <div class="config-row">
      <label>启用审查的私聊用户 <div class="hint">每行一个，"0" 表示所有私聊</div></label>
      <textarea id="cfg-private_scope" rows="3"></textarea>
    </div>
    <div class="config-row">
      <label>抽查概率</label>
      <input type="number" id="cfg-check_probability" min="0" max="1" step="0.05">
    </div>
  </div>

  <div class="config-section">
    <h3>⚖️ 判罚设置</h3>
    <div class="config-row">
      <label>撤回违规消息</label>
      <input type="checkbox" id="cfg-enable_recall">
    </div>
    <div class="config-row">
      <label>禁言时长（秒）<div class="hint">0 为不禁言</div></label>
      <input type="number" id="cfg-ban_duration" min="0" max="2592000">
    </div>
    <div class="config-row">
      <label>上报目标 ID</label>
      <input type="text" id="cfg-report_target_id" placeholder="留空不转发">
    </div>
    <div class="config-row">
      <label>群上报映射</label>
      <div class="complex-field">
        请在 <a href="#" onclick="openPluginConfig()" style="color:var(--primary)">插件配置页</a> 中管理
      </div>
    </div>
  </div>

  <div class="config-section">
    <h3>🖼️ 图片处理</h3>
    <div class="config-row">
      <label>压缩上限（字节）</label>
      <input type="number" id="cfg-compressed_image_max_bytes" min="1024" max="10485760" step="1024">
    </div>
    <div class="config-row">
      <label>历史最大条数</label>
      <input type="number" id="cfg-audit_history_max_records" min="0" max="10000">
    </div>
  </div>

  <div class="config-section">
    <h3>🔍 调试</h3>
    <div class="config-row">
      <label>保留压缩图到临时目录</label>
      <input type="checkbox" id="cfg-keep_compressed_image_in_temp">
    </div>
    <div class="config-row">
      <label>调试日志（LLM 响应）</label>
      <input type="checkbox" id="cfg-debug_log_llm_response">
    </div>
  </div>

  <div style="text-align:right;margin-bottom:24px;">
    <button class="btn" onclick="loadConfig()">↩️ 撤销</button>
    <button class="btn btn-success" onclick="saveConfig()">💾 保存配置</button>
  </div>
  <div id="config-status" style="text-align:center;font-size:13px;margin-bottom:16px;" aria-live="polite"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="违规图片预览">
</div>

<!-- 自定义确认弹窗 -->
<div class="dialog-overlay" id="dialog-overlay" role="dialog" aria-modal="true" aria-label="确认操作">
  <div class="dialog-box">
    <div class="dialog-message" id="dialog-msg"></div>
    <div class="dialog-buttons" id="dialog-btns"></div>
  </div>
</div>

<script>
const PAGE_SIZE = 15;
let allRecords = [];
let currentPage = 1;
let fullConfig = {};

/* ── 自定义弹窗（绕过 iframe sandbox）── */
let _activeDialogResolve = null;
function showDialog(msg, buttons) {
  // 先清理上一个未完成的弹窗
  if (_activeDialogResolve) { _activeDialogResolve(false); _activeDialogResolve = null; }
  return new Promise(resolve => {
    _activeDialogResolve = resolve;
    document.getElementById('dialog-msg').textContent = msg;
    const btns = document.getElementById('dialog-btns');
    btns.innerHTML = buttons.map((b, i) =>
      `<button class="btn ${b.cls || ''}" data-idx="${i}">${b.text}</button>`
    ).join('');
    btns.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('dialog-overlay').classList.remove('open');
        _activeDialogResolve = null;
        resolve(buttons[btn.dataset.idx].value);
      }, { once: true });
    });
    document.getElementById('dialog-overlay').classList.add('open');
  });
}
function showAlert(msg) {
  return showDialog(msg, [{ text: '确定', value: undefined, cls: 'btn-primary' }]);
}
function showConfirm(msg) {
  return showDialog(msg, [
    { text: '取消', value: false },
    { text: '确定', value: true, cls: 'btn-danger' }
  ]);
}

function ready(fn) {
  if (window.AstrBotPluginPage) {
    window.AstrBotPluginPage.ready().then(ctx => {
      applyTheme(ctx.isDark);
      window.AstrBotPluginPage.onContextChange(newCtx => {
        applyTheme(newCtx.isDark);
      });
      fn(ctx);
    });
  } else {
    document.addEventListener('DOMContentLoaded', fn);
  }
}

function applyTheme(isDark) {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
}

ready(async () => {
  await loadRecords();
});

/* ── 标签切换 ── */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-audit').classList.toggle('hidden', name !== 'audit');
  document.getElementById('panel-audit').classList.toggle('audit-panel', name === 'audit');
  document.getElementById('panel-config').classList.toggle('active', name === 'config');
  if (name === 'config') loadConfig();
}

/* ── 跳转到插件配置页 ── */
function openPluginConfig() {
  // 通过 Bridge SDK 通知父页面跳转
  window.parent.postMessage({
    channel: 'astrbot-plugin-page',
    type: 'navigate',
    payload: { path: '/plugins' }
  }, '*');
}

/* ══════════════════════════════════════════════
   审核记录
   ══════════════════════════════════════════════ */

async function loadRecords() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="8" class="empty">加载中…</td></tr>';
  try {
    const res = await window.AstrBotPluginPage.apiGet('audit/list');
    allRecords = (res.records || []).reverse();
    renderStats(res.provider_stats);
    renderCacheStats(res.cache_stats, res.storage_size);
    render();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">加载失败: ${e.message || e}</td></tr>`;
  }
}

function renderStats(stats) {
  stats = stats || {};
  const keys = Object.keys(stats);
  const container = document.getElementById('provider-stats');
  if (keys.length === 0) {
    container.innerHTML = '<span style="font-size:12px;color:var(--text-secondary);">暂无数据</span>';
    return;
  }
  const maxVal = Math.max(...Object.values(stats), 1);
  container.innerHTML = keys.map(k => {
    const pct = (stats[k] / maxVal * 100).toFixed(0);
    return `<div class="provider-bar-wrap">
      <span class="name" title="${escHtml(k)}">${escHtml(k)}</span>
      <div class="provider-bar"><div class="provider-bar-fill" style="width:${pct}%"></div></div>
      <span class="count">${stats[k]}</span>
    </div>`;
  }).join('');
}

function renderCacheStats(cs, ss) {
  const el = document.getElementById('cache-stats');
  if (!cs || !cs.total_unique_images) {
    el.innerHTML = '<span style="font-size:12px;color:var(--text-secondary);">暂无缓存数据</span>';
    return;
  }
  const sizeHtml = ss ? `
    <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);">
      审核记录 ${formatBytes(ss.audit_records ?? 0)} | 缓存 ${formatBytes(ss.cache_data ?? 0)}
    </div>` : '';
  el.innerHTML = `
    <div>
      <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;">
        <span>🖼️ 缓存图片 <strong>${cs.total_unique_images}</strong> 张</span>
        <span>⏭️ 已跳过 <strong>${cs.images_skip_audit}</strong> 张</span>
        <span>🎯 阈值 <strong>${cs.threshold}</strong> 次</span>
        <span>📦 上限 <strong>${cs.max_entries}</strong> 条</span>
      </div>
      ${sizeHtml}
    </div>`;
}

function render() {
  document.getElementById('stat-total').textContent = allRecords.length;
  document.getElementById('stat-recalled').textContent = allRecords.filter(r => r.recalled).length;
  document.getElementById('stat-banned').textContent = allRecords.filter(r => r.banned).length;

  const totalPages = Math.max(1, Math.ceil(allRecords.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const page = allRecords.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tbody');

  if (page.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无审核记录</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = page.map(r => {
    const time = r.time || r.timestamp || '-';
    const user = r.user_name || r.user_id || '-';
    const userId = r.user_id || '';
    const group = r.group_id ? `群 ${r.group_id}` : '私聊';
    const reason = r.reason || '-';
    const imgUrl = r.local_image_url || r.image_url;
    const sizeText = r.local_image_size ? formatBytes(r.local_image_size) : (imgUrl && !r.local_image_url ? '远程' : '');
    const imgHtml = imgUrl
      ? `<div class="img-wrap"><img class="image-thumb" data-img="${escAttr(imgUrl)}" onclick="preview('${escAttr(imgUrl)}')" alt="\u8fdd\u89c4\u56fe\u7247" loading="lazy"><span class="img-stamp">违规</span></div><div class="img-size">${escHtml(sizeText)}</div>`
      : '-';
    const recallTag = r.recalled
      ? '<span class="tag tag-success">✅ 已撤回</span>'
      : '<span class="tag tag-fail">❌ 失败</span>';
    const banTag = r.banned
      ? '<span class="tag tag-success">✅ 已禁言</span>'
      : r.banned === false && r.ban_duration > 0
        ? '<span class="tag tag-fail">❌ 失败</span>'
        : '<span class="tag tag-muted">—</span>';
    return `<tr>
      <td style="white-space:nowrap;font-size:12px;">${escHtml(time)}</td>
      <td class="user-cell" title="${escHtml(userId)}">${escHtml(user)}</td>
      <td style="font-size:12px;">${escHtml(group)}</td>
      <td><div class="reason-text" title="${escHtml(reason)}">${escHtml(reason)}</div></td>
      <td>${imgHtml}</td>
      <td>${recallTag}</td>
      <td>${banTag}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteRecord('${escHtml(r.id)}')">删除</button></td>
    </tr>`;
  }).join('');

  // 绕过 AstrBot HTML 重写：把 data-img 回填到 src
  tbody.querySelectorAll('img[data-img]').forEach(img => {
    img.src = img.getAttribute('data-img');
    img.removeAttribute('data-img');
  });

  const pg = document.getElementById('pagination');
  pg.innerHTML = `
    <button class="btn btn-sm" onclick="goPage(1)" ${currentPage <= 1 ? 'disabled' : ''}>首页</button>
    <button class="btn btn-sm" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>
    <span>${currentPage} / ${totalPages}</span>
    <button class="btn btn-sm" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>
    <button class="btn btn-sm" onclick="goPage(${totalPages})" ${currentPage >= totalPages ? 'disabled' : ''}>末页</button>
  `;
}

function goPage(p) { currentPage = p; render(); }
function refresh() { currentPage = 1; loadRecords(); }

async function clearAll() {
  if (!(await showConfirm('确定清空所有审核记录？'))) return;
  try {
    await window.AstrBotPluginPage.apiPost('audit/clear', { _method: 'DELETE' });
    allRecords = []; currentPage = 1; render();
  } catch (e) { await showAlert('清空失败: ' + (e.message || e)); }
}

async function deleteRecord(id) {
  if (!(await showConfirm('确定删除此记录？'))) return;
  try {
    await window.AstrBotPluginPage.apiPost('audit/delete', { id });
    allRecords = allRecords.filter(r => r.id !== id); render();
  } catch (e) { await showAlert('删除失败: ' + (e.message || e)); }
}

function preview(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    if (_activeDialogResolve) {
      _activeDialogResolve(false);
      _activeDialogResolve = null;
      document.getElementById('dialog-overlay').classList.remove('open');
    }
  }
});

/* ══════════════════════════════════════════════
   配置编辑
   ══════════════════════════════════════════════ */

async function loadConfig() {
  document.getElementById('config-status').textContent = '加载中…';
  try {
    const res = await window.AstrBotPluginPage.apiGet('audit/config');
    fullConfig = res || {};
    const cfg = fullConfig;
    setTextarea('cfg-sensitive_texts', listToLines(cfg.sensitive_texts));
    setTextarea('cfg-forbidden_descriptions', listToLines(cfg.forbidden_descriptions));
    setTextarea('cfg-custom_vision_prompt', cfg.custom_vision_prompt || '');
    setSelect('cfg-reasoning_effort', cfg.reasoning_effort || '');
    setNumber('cfg-llm_max_tokens', cfg.llm_max_tokens);
    setNumber('cfg-llm_timeout_seconds', cfg.llm_timeout_seconds);
    setTextarea('cfg-group_scope', listToLines(cfg.group_scope));
    setTextarea('cfg-private_scope', listToLines(cfg.private_scope));
    setNumber('cfg-check_probability', cfg.check_probability);
    setCheck('cfg-enable_recall', cfg.enable_recall);
    setNumber('cfg-ban_duration', cfg.ban_duration);
    setValue('cfg-report_target_id', cfg.report_target_id || '');
    setNumber('cfg-compressed_image_max_bytes', cfg.compressed_image_max_bytes);
    setNumber('cfg-audit_history_max_records', cfg.audit_history_max_records);
    setCheck('cfg-keep_compressed_image_in_temp', cfg.keep_compressed_image_in_temp);
    setCheck('cfg-debug_log_llm_response', cfg.debug_log_llm_response);

    // 供应商摘要
    const providers = cfg.llm_providers || [];
    document.getElementById('cfg-provider-summary').textContent =
      providers.length > 0
        ? `已配置 ${providers.length} 个供应商：${providers.map(p => p.name || '?').join('、')}`
        : '暂未配置供应商';

    document.getElementById('config-status').textContent = '';
  } catch (e) {
    document.getElementById('config-status').textContent = '加载配置失败: ' + (e.message || e);
  }
}

async function saveConfig() {
  if (!(await showConfirm('保存配置后将重载插件，确定继续？'))) return;
  document.getElementById('config-status').textContent = '保存中…';
  try {
    const cfg = Object.assign({}, fullConfig, {
      sensitive_texts: linesToList(document.getElementById('cfg-sensitive_texts').value),
      forbidden_descriptions: linesToList(document.getElementById('cfg-forbidden_descriptions').value),
      custom_vision_prompt: document.getElementById('cfg-custom_vision_prompt').value,
      reasoning_effort: document.getElementById('cfg-reasoning_effort').value,
      llm_max_tokens: parseInt(document.getElementById('cfg-llm_max_tokens').value) || 512,
      llm_timeout_seconds: parseFloat(document.getElementById('cfg-llm_timeout_seconds').value) || 120,
      group_scope: linesToList(document.getElementById('cfg-group_scope').value),
      private_scope: linesToList(document.getElementById('cfg-private_scope').value),
      check_probability: floatVal('cfg-check_probability', 1.0),
      enable_recall: document.getElementById('cfg-enable_recall').checked,
      ban_duration: intVal('cfg-ban_duration', 86400),
      report_target_id: document.getElementById('cfg-report_target_id').value,
      compressed_image_max_bytes: intVal('cfg-compressed_image_max_bytes', 1048576),
      audit_history_max_records: intVal('cfg-audit_history_max_records', 500),
      keep_compressed_image_in_temp: document.getElementById('cfg-keep_compressed_image_in_temp').checked,
      debug_log_llm_response: document.getElementById('cfg-debug_log_llm_response').checked,
    });
    await window.AstrBotPluginPage.apiPost('audit/config/update', cfg);
    document.getElementById('config-status').textContent = '✅ 已保存，插件重载中…';
  } catch (e) {
    document.getElementById('config-status').textContent = '❌ 保存失败: ' + (e.message || e);
  }
}

/* ── 工具函数 ── */
function listToLines(arr) { return Array.isArray(arr) ? arr.join('\n') : ''; }
function linesToList(str) { return str.split('\n').map(s => s.trim()).filter(Boolean); }
function setTextarea(id, val) { document.getElementById(id).value = val || ''; }
function setValue(id, val) { document.getElementById(id).value = val || ''; }
function setNumber(id, val) { document.getElementById(id).value = val != null ? val : ''; }
function intVal(id, fallback) { const v = parseInt(document.getElementById(id).value); return isNaN(v) ? fallback : v; }
function floatVal(id, fallback) { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? fallback : v; }
function setCheck(id, val) { document.getElementById(id).checked = !!val; }
function setSelect(id, val) { document.getElementById(id).value = val || ''; }

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  // 仅转义会破坏 HTML 属性边界的字符，保留 & 防止 URL 损坏
  if (!s) return '';
  return String(s).replace(/"/g, '&quot;');
}

function formatBytes(bytes) {
  if (!bytes && bytes !== 0) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}
